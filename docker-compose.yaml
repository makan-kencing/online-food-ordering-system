services:
    db:
        image: gvenzl/oracle-free:latest
        ports:
            - "1521:1521"
        environment:
            ORACLE_RANDOM_PASSWORD: yes
            APP_USER: ${DB_USERNAME}
            APP_USER_PASSWORD: ${DB_PASSWORD}
        volumes:
            - oracle-data:/opt/oracle/oradata
            - ./var/shared:/shared
        healthcheck:
            test: [ "CMD", "healthcheck.sh" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 5s
            start_interval: 5s
